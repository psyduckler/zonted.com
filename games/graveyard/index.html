  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/zonted.css?v=2026-05-21-scrollpad">

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0a0815 !important; color: #e8e2d0; overflow: hidden; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    #canvas { display: block; position: fixed; left: 0; top: 0; image-rendering: pixelated; image-rendering: crisp-edges; }
    #loader {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: #0a0815; z-index: 10; transition: opacity .6s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader .glow {
      color: #cdd6f4; letter-spacing: .25em; font-size: 14px;
      text-transform: uppercase; opacity: .8;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: .35 } 50% { opacity: .9 } }

    #hud {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      color: #c9b87a; background: rgba(20,15,40,.78); border: 2px solid rgba(201,184,122,.5);
      border-radius: 8px; padding: 6px 14px; font-family: 'Special Elite', monospace;
      font-size: 13px; letter-spacing: .08em; pointer-events: none; z-index: 4;
    }
    #hud #hud-count { color: #ece2c4; font-weight: 700; }

    #footer {
      position: fixed; right: 10px; bottom: 8px; z-index: 5;
      font-size: 11px; color: rgba(232,226,208,.45); pointer-events: auto;
    }
    #footer a { color: inherit; text-decoration: underline; text-decoration-color: rgba(232,226,208,.25); }

    #dialog {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      width: min(720px, calc(100vw - 32px));
      z-index: 6;
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }
    #dialog.hidden { opacity: 0; transform: translate(-50%, 12px); pointer-events: none; }
    .dialog-inner {
      position: relative;
      background: linear-gradient(180deg, #1c1830 0%, #15122a 100%);
      border: 3px solid #c9b87a;
      border-radius: 14px;
      padding: 18px 22px 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,.55), inset 0 0 0 2px rgba(0,0,0,.5), inset 0 0 30px rgba(201,184,122,.06);
      color: #ece2c4;
      font-family: 'Special Elite', ui-monospace, Menlo, monospace;
    }
    .dialog-name {
      font-weight: 700; font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
      color: #c9b87a; margin-bottom: 8px;
    }
    .dialog-text {
      font-size: 16px; line-height: 1.55; min-height: 4.6em; white-space: pre-wrap;
    }
    .dialog-hint {
      position: absolute; right: 18px; bottom: 10px; color: #c9b87a; font-size: 14px;
      opacity: 0; animation: blink 1.1s ease-in-out infinite; pointer-events: none;
    }
    .dialog-hint.show { opacity: 1; }
    @keyframes blink { 0%, 100% { opacity: .3 } 50% { opacity: 1 } }
  </style>
</head>
<body>
  <nav class="zn-nav">
    <div class="zn-nav-inner">
      <a href="/" class="zn-logo"><span class="zn-avatar-sm">Z</span>zonted.</a>
      <input type="checkbox" id="zn-menu-toggle" class="zn-menu-toggle" aria-label="Toggle menu">
      <label for="zn-menu-toggle" class="zn-menu-btn" aria-hidden="true"><span></span><span></span><span></span></label>
      <div class="zn-nav-links">
        <a href="/posts/">Posts</a>
        <a href="/portfolio/">Portfolio</a>
        <a href="/games/graveyard/" class="active">Failures</a>
        <a href="/ai-stack/">AI Stack</a>
        <a href="/metrics/">Metrics</a>
        <a href="/about/">About</a>
        <a href="/#subscribe" class="zn-nav-cta">Subscribe</a>
      </div>
    </div>
  </nav>

  <canvas id="canvas"></canvas>
  <div id="loader"><div class="glow">Entering the graveyard…</div></div>
  <div id="hud"><span id="hud-count">0 / 0</span> souls laid to rest</div>
  <div id="dialog" class="hidden" role="dialog" aria-live="polite">
    <div class="dialog-inner">
      <div class="dialog-name" id="dialog-name"></div>
      <div class="dialog-text" id="dialog-text"></div>
      <div class="dialog-hint" id="dialog-hint">▼</div>
    </div>
  </div>
  <div id="footer">Built by <a href="https://zonted.com">Zonted</a></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
